<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smile Dental Clinic | Smart Scheduler</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #e0f2fe 0%, #b9e0f5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
        body::before { content: "🦷"; font-size: 140px; opacity: 0.05; position: absolute; bottom: 20px; right: 20px; pointer-events: none; transform: rotate(-10deg); }
        .chat-container { width: 100%; max-width: 550px; background: white; border-radius: 40px; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.4); overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #1e6f5c 0%, #289672 100%); padding: 20px 24px; color: white; display: flex; align-items: center; gap: 14px; border-bottom: 2px solid #ffd966; }
        .header-icon { background: white; width: 52px; height: 52px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #1e6f5c; box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .header-text h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.3px; }
        .header-text p { font-size: 0.8rem; opacity: 0.9; font-weight: 500; margin-top: 4px; }
        .chat-messages { height: 450px; overflow-y: auto; padding: 20px 18px; background: #fefdf8; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeInUp 0.2s ease; }
        .bot-message { align-self: flex-start; }
        .user-message { align-self: flex-end; }
        .bubble { padding: 12px 18px; border-radius: 24px; font-size: 0.95rem; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.05); }
        .bot-message .bubble { background: #eef2f5; color: #1e2a32; border-bottom-left-radius: 6px; }
        .user-message .bubble { background: #1e6f5c; color: white; border-bottom-right-radius: 6px; }
        .button-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .chat-btn { background: white; border: 1.5px solid #cbdde6; padding: 8px 18px; border-radius: 60px; font-size: 0.85rem; font-weight: 600; color: #1e6f5c; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .chat-btn:hover { background: #e0f2e9; border-color: #1e6f5c; transform: translateY(-1px); }
        .chat-btn:active { transform: translateY(1px); }
        .chat-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .input-area { padding: 16px 20px 24px; background: white; border-top: 1px solid #e9edf2; display: flex; gap: 12px; align-items: center; }
        .input-field { flex: 1; padding: 12px 18px; border-radius: 60px; border: 1px solid #cfdfe8; font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #1e6f5c; box-shadow: 0 0 0 2px rgba(30,111,92,0.2); }
        .input-field:disabled { background: #f5f7fa; color: #8b9aaa; cursor: not-allowed; }
        .send-btn { background: #1e6f5c; border: none; color: white; width: 48px; height: 48px; border-radius: 60px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { background: #b0c4ce; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { background: #0f5545; transform: scale(0.96); }
        .typing-indicator { font-size: 0.8rem; color: #6b7b8c; padding: 8px 12px; background: #eef2f5; width: fit-content; border-radius: 30px; margin-top: 6px; }
        .loader-dots { display: inline-flex; gap: 4px; }
        .loader-dots span { width: 6px; height: 6px; background: #6b7b8c; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        footer { font-size: 0.7rem; text-align: center; padding: 10px; background: #f7f9fc; color: #7a8b9b; border-top: 1px solid #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e9edf2; }
        ::-webkit-scrollbar-thumb { background: #b9cfdf; border-radius: 8px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="header-icon"><i class="fas fa-tooth"></i></div>
        <div class="header-text">
            <h1>Smile Dental Clinic</h1>
            <p>✨ Smart scheduling • gentle care</p>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            <div class="bubble">
                👋 Welcome to Smile Dental Clinic! I'm your virtual assistant.<br>
                How can I help you today?
            </div>
            <div class="button-group" id="initialButtons">
                <button class="chat-btn" data-action="new_patient">🦷 New Patient</button>
                <button class="chat-btn" data-action="existing_patient">📋 Existing Patient</button>
                <button class="chat-btn" data-action="general_inquiry">💬 General Inquiry</button>
            </div>
        </div>
    </div>

    <div class="input-area" id="inputArea">
        <input type="text" id="userInput" class="input-field" placeholder="Type your answer..." autocomplete="off" disabled>
        <button id="sendBtn" class="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
    </div>
    <footer>⭐ Secure &nbsp;|&nbsp; Powered by n8n</footer>
</div>

<script>
    // ------------------- CONFIGURATION -------------------
    const APPOINTMENT_WEBHOOK_URL = "https://n8n.n8ncreation.cc/webhook-test/8a8e471b-94cd-466f-8bda-9c313f4ca425";
    const RAG_WEBHOOK_URL = "https://n8n.n8ncreation.cc/webhook-test/805670a4-6cc9-4b2f-a45c-d42c69d963e2";
    
    let sessionId = localStorage.getItem('smile_sessionId');
    if (!sessionId) {
        sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('smile_sessionId', sessionId);
    }

    // ---------- STATE ----------
    let currentStep = 'initial';
    let isRagMode = false;
    let appointmentData = {
        patientType: '',
        action: '',           // 'new_booking', 'modify', 'cancel'
        procedure: '',
        name: '',
        phone: '',
        email: '',
        datetime: '',
        preferredCommunication: ''
    };

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // ---------- HELPERS ----------
    function setInputEnabled(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        userInput.placeholder = enabled ? "Type your answer..." : "Please use the buttons above";
        if (enabled) userInput.focus();
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addBotMessage(text, buttons = []) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = text.replace(/\n/g, '<br>');
        msgDiv.appendChild(bubble);
        if (buttons.length) {
            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'chat-btn';
                button.innerText = btn.text;
                button.setAttribute('data-value', btn.value);
                button.addEventListener('click', () => {
                    addUserMessage(btn.text);
                    handleButtonClick(btn.value);
                });
                btnGroup.appendChild(button);
            });
            msgDiv.appendChild(btnGroup);
        }
        chatMessages.appendChild(msgDiv);
        scrollToBottom();
    }

    function addUserMessage(content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = content;
        msgDiv.appendChild(bubble);
        chatMessages.appendChild(msgDiv);
        scrollToBottom();
    }

    function showTyping() {
        hideTyping();
        const typing = document.createElement('div');
        typing.className = 'message bot-message';
        typing.id = 'typingIndicator';
        typing.innerHTML = `<div class="typing-indicator"><div class="loader-dots"><span>.</span><span>.</span><span>.</span></div> Thinking...</div>`;
        chatMessages.appendChild(typing);
        scrollToBottom();
    }
    function hideTyping() {
        document.getElementById('typingIndicator')?.remove();
    }

    function showMainMenu() {
        currentStep = 'initial';
        isRagMode = false;
        appointmentData = { patientType: '', action: '', procedure: '', name: '', phone: '', email: '', datetime: '', preferredCommunication: '' };
        addBotMessage("👋 What would you like to do?", [
            { text: '🦷 New Patient', value: 'new_patient' },
            { text: '📋 Existing Patient', value: 'existing_patient' },
            { text: '💬 General Inquiry', value: 'general_inquiry' }
        ]);
        setInputEnabled(false);
    }

    // ---------- OPTIONS ----------
    const newPatientOptions = [{ text: '✨ New Booking', value: 'new_booking' }];
    const existingPatientOptions = [
        { text: '✏️ Modify Appointment', value: 'modify' },
        { text: '❌ Cancel Appointment', value: 'cancel' }
    ];
    const procedureOptions = [
        { text: '🪥 Routine cleaning / checkup', value: 'Routine cleaning / checkup' },
        { text: '🚨 Emergency / dental pain', value: 'Emergency / dental pain' },
        { text: '🦷 Consultation (Invisalign, Implants, etc.)', value: 'Consultation' },
        { text: '🔧 Filling or Tooth Repair', value: 'Filling / Repair' }
    ];
    const commPrefOptions = [
        { text: '📞 Phone', value: 'Phone' },
        { text: '💬 Text', value: 'Text' },
        { text: '📧 Email', value: 'Email' }
    ];
    const ragFollowUpOptions = [
        { text: '🔄 Ask another question', value: 'ask_another' },
        { text: '🏠 Back to main menu', value: 'main_menu' }
    ];
    const errorRecoveryOptions = [{ text: '🔄 Start Over', value: 'restart' }];

    // ---------- BUTTON HANDLER ----------
    function handleButtonClick(value) {
        if (value === 'restart') { showMainMenu(); return; }

        // Main menu selection
        if (currentStep === 'initial') {
            document.getElementById('initialButtons').style.display = 'none';
            appointmentData.patientType = value;
            if (value === 'general_inquiry') {
                isRagMode = true;
                currentStep = 'rag_question';
                addBotMessage("💡 What would you like to know about our clinic?", []);
                setInputEnabled(true);
            } else if (value === 'new_patient') {
                isRagMode = false;
                currentStep = 'new_booking_type';
                addBotMessage("Is this a new appointment?", newPatientOptions);
                setInputEnabled(false);
            } else if (value === 'existing_patient') {
                isRagMode = false;
                currentStep = 'existing_action';
                addBotMessage("What would you like to do with your existing appointment?", existingPatientOptions);
                setInputEnabled(false);
            }
        }
        // New patient → new booking
        else if (currentStep === 'new_booking_type') {
            appointmentData.action = value; // 'new_booking'
            currentStep = 'procedure';
            addBotMessage("Select procedure:", procedureOptions);
            setInputEnabled(false);
        }
        // Procedure selection (new booking)
        else if (currentStep === 'procedure') {
            appointmentData.procedure = value;
            currentStep = 'collecting_name';
            addBotMessage("📝 Please enter your **full name**:", []);
            setInputEnabled(true);
        }
        // Communication preference (new booking)
        else if (currentStep === 'collecting_comm_pref') {
            appointmentData.preferredCommunication = value;
            submitAppointment('new_booking');
        }
        // Existing patient action selection
        else if (currentStep === 'existing_action') {
            appointmentData.action = value; // 'modify' or 'cancel'
            if (value === 'modify') {
                currentStep = 'collecting_name_modify';
                addBotMessage("📝 Please enter your **full name** as it appears on the appointment:", []);
                setInputEnabled(true);
            } else { // cancel
                currentStep = 'collecting_name_email_cancel';
                addBotMessage("📝 Please enter your **full name** and **email** (e.g., John Doe, john@example.com):", []);
                setInputEnabled(true);
            }
        }
        // Procedure selection for modify
        else if (currentStep === 'collecting_new_procedure') {
            appointmentData.procedure = value;
            currentStep = 'collecting_new_datetime';
            addBotMessage("📅 What is the new **date and time** for your appointment? (e.g., 'April 20, 2:00 PM')", []);
            setInputEnabled(true);
        }
        // Cancel confirmation
        else if (currentStep === 'confirm_cancel') {
            if (value === 'confirm_cancel') {
                submitAppointment('cancel');
            } else {
                showMainMenu();
            }
        }
        // RAG follow-up
        else if (currentStep === 'rag_followup') {
            if (value === 'ask_another') {
                currentStep = 'rag_question';
                addBotMessage("Sure! What else would you like to know?", []);
                setInputEnabled(true);
            } else {
                showMainMenu();
            }
        }

        // Handle main menu selections from dynamic buttons
        if (['new_patient','existing_patient','general_inquiry'].includes(value) && 
            ['initial','rag_followup','completed','error'].includes(currentStep)) {
            addUserMessage(value === 'new_patient' ? 'New Patient' : (value === 'existing_patient' ? 'Existing Patient' : 'General Inquiry'));
            handleButtonClick(value);
        }
    }

    // ---------- TEXT INPUT ----------
    function handleTextInput() {
        const text = userInput.value.trim();
        if (!text) return;
        addUserMessage(text);
        userInput.value = '';
        setInputEnabled(false);

        if (isRagMode && currentStep === 'rag_question') {
            sendRagQuery(text);
            return;
        }

        switch (currentStep) {
            // New patient flow
            case 'collecting_name':
                appointmentData.name = text;
                currentStep = 'collecting_phone';
                addBotMessage("📞 What is the best **phone number** to reach you?", []);
                setInputEnabled(true);
                break;
            case 'collecting_phone':
                appointmentData.phone = text;
                currentStep = 'collecting_email';
                addBotMessage("📧 Please provide your **email address** for confirmation:", []);
                setInputEnabled(true);
                break;
            case 'collecting_email':
                appointmentData.email = text;
                currentStep = 'collecting_datetime';
                addBotMessage("📅 When would you like to come in? (e.g., 'April 12, 10:30 AM')", []);
                setInputEnabled(true);
                break;
            case 'collecting_datetime':
                appointmentData.datetime = text;
                currentStep = 'collecting_comm_pref';
                addBotMessage("📲 How would you prefer we contact you?", commPrefOptions);
                setInputEnabled(false);
                break;
            
            // Modify flow: name → phone → new procedure → new datetime
            case 'collecting_name_modify':
                appointmentData.name = text;
                currentStep = 'collecting_phone_modify';
                addBotMessage("📞 Please enter the **phone number** associated with your appointment:", []);
                setInputEnabled(true);
                break;
            case 'collecting_phone_modify':
                appointmentData.phone = text;
                currentStep = 'collecting_new_procedure';
                addBotMessage("Which procedure would you like to change to?", procedureOptions);
                setInputEnabled(false);
                break;
            case 'collecting_new_datetime':
                appointmentData.datetime = text;
                submitAppointment('modify');
                break;
            
            // Cancel flow: name + email in one input (or could be separate)
            case 'collecting_name_email_cancel':
                const parts = text.split(',').map(s => s.trim());
                appointmentData.name = parts[0] || '';
                appointmentData.email = parts[1] || '';
                currentStep = 'confirm_cancel';
                addBotMessage(`Are you sure you want to cancel the appointment for ${appointmentData.name}?`, [
                    { text: '✅ Yes, cancel it', value: 'confirm_cancel' },
                    { text: '❌ No, go back', value: 'main_menu' }
                ]);
                setInputEnabled(false);
                break;
            
            default:
                addBotMessage("Please use the buttons to continue.", []);
                setInputEnabled(false);
        }
    }

    // ---------- RAG ----------
    async function sendRagQuery(question) {
        showTyping();
        setInputEnabled(false);
        try {
            const response = await fetch(RAG_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, question })
            });
            hideTyping();
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            let answer;
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                const data = await response.json();
                answer = data.answer || data.response || data.text || "I'm sorry, I couldn't find an answer.";
            } else {
                answer = await response.text();
            }
            
            addBotMessage(answer);
            currentStep = 'rag_followup';
            addBotMessage("Would you like to ask another question or return to the main menu?", ragFollowUpOptions);
        } catch (error) {
            hideTyping();
            console.error("RAG error:", error);
            addBotMessage("⚠️ Sorry, I'm having trouble answering right now.", errorRecoveryOptions);
            currentStep = 'error';
        }
    }

    // ---------- SUBMIT APPOINTMENT ----------
    async function submitAppointment(actionType) {
        showTyping();
        setInputEnabled(false);
        currentStep = 'completed';
        const payload = {
            sessionId,
            action: actionType,
            data: { 
                ...appointmentData, 
                action: actionType,
                status: actionType === 'cancel' ? 'cancelled' : 'confirmed'
            }
        };
        try {
            const response = await fetch(APPOINTMENT_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            hideTyping();
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            let msg = actionType === 'cancel' ? '✅ Your appointment has been cancelled.' : '✅ Your appointment request has been received. We'll confirm shortly.';
            addBotMessage(msg + " 😊");
            addBotMessage("Would you like to start over?", [{ text: '🔄 Start Over', value: 'restart' }]);
        } catch (error) {
            hideTyping();
            console.error("Appointment error:", error);
            addBotMessage("⚠️ Sorry, we couldn't process your request. Please try again.", errorRecoveryOptions);
            currentStep = 'error';
        }
    }

    // ---------- INITIAL BINDINGS ----------
    function bindInitialButtons() {
        document.querySelectorAll('#initialButtons .chat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.getAttribute('data-action');
                addUserMessage(btn.innerText);
                appointmentData.patientType = action;
                document.getElementById('initialButtons').style.display = 'none';
                if (action === 'general_inquiry') {
                    isRagMode = true;
                    currentStep = 'rag_question';
                    addBotMessage("💡 What would you like to know about our clinic?", []);
                    setInputEnabled(true);
                } else if (action === 'new_patient') {
                    isRagMode = false;
                    currentStep = 'new_booking_type';
                    addBotMessage("Is this a new appointment?", newPatientOptions);
                    setInputEnabled(false);
                } else if (action === 'existing_patient') {
                    isRagMode = false;
                    currentStep = 'existing_action';
                    addBotMessage("What would you like to do with your existing appointment?", existingPatientOptions);
                    setInputEnabled(false);
                }
            });
        });
    }

    // Global listener for dynamic buttons (main menu after RAG, etc.)
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('chat-btn')) {
            const val = e.target.getAttribute('data-value');
            if (val === 'restart') {
                addUserMessage(e.target.innerText);
                showMainMenu();
            }
        }
    });

    sendBtn.addEventListener('click', handleTextInput);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !userInput.disabled) handleTextInput();
    });

    setInputEnabled(false);
    bindInitialButtons();
</script>
</body>
</html>
